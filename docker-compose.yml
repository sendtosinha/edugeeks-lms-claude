version: '3.8'

services:
  # ─── PostgreSQL ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: edugeeks_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: edugeeks_db
      POSTGRES_USER: edugeeks
      POSTGRES_PASSWORD: edugeeks_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edugeeks -d edugeeks_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis (optional — for session caching) ───────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: edugeeks_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # ─── Backend API ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: edugeeks_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgresql://edugeeks:edugeeks_secret@postgres:5432/edugeeks_db
      JWT_SECRET: dev_jwt_secret_replace_in_production
      JWT_REFRESH_SECRET: dev_refresh_secret_replace_in_production
      FRONTEND_URL: http://localhost:3000
    ports:
      - "5000:5000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
    command: npm run dev

  # ─── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: edugeeks_web
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api/v1
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
